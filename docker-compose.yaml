# documentation: https://github.com/RightNow-AI/openfang
# slogan: Open-source AI chatbot orchestrator
# category: ai
# tags: ai, chatbot, openfang, automation
# logo: svgs/openfang.svg
# port: 4200

services:
  openfang:
    build:
      context: .
      dockerfile: Dockerfile.binary
      args:
        OPENFANG_VERSION: ${OPENFANG_VERSION:-v0.5.1}

    environment:
      - SERVICE_URL_OPENFANG_4200
      - OPENFANG_HOME=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}

    volumes:
      - openfang-data:/data

    command: ["sh", "-lc", "openfang init --quick && exec openfang start"]

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5)"]
      interval: 30s
      timeout:10s
      retries: 5
      start_period: 20s

    restart: unless-stopped

volumes:
  openfang-data: